{% extends 'web/base.html' %}

{% block title %}
Home
{% endblock %}

{% block content %}

<h2 class="mb-4">
    Latest Products 😄
</h2>

<div class="row">

    {% for product in products %}

    <div class="col-md-3 mb-4">

        <div class="card h-100 shadow">

            {% if product.image %}

            <img
                src="{{ url_for('static', filename='images/' + product.image) }}"
                class="card-img-top"
                height="250"
                style="object-fit: cover;"
            >

            {% endif %}

            <div class="card-body">

                <h5>
                    {{ product.name }}
                </h5>

                <p class="text-success fw-bold">

                    ₹ {{ product.price }}

                </p>

                <p>

                    {{ product.description[:70] }}...

                </p>

                <a
                    href="{{ url_for('product_details', id=product.id) }}"
                    class="btn btn-primary w-100"
                >
                    View Details
                </a>

            </div>

        </div>

    </div>

    {% endfor %}

</div>

{% endblock %}
