{% extends 'web/base.html' %}

{% block title %}
Register
{% endblock %}

{% block content %}

<div class="row justify-content-center">

    <div class="col-md-5">

        <div class="card shadow">

            <div class="card-header bg-dark text-white">

                <h3>
                    Customer Register
                </h3>

            </div>

            <div class="card-body">

                <form method="POST">

                    <div class="mb-3">

                        <label>
                            Full Name
                        </label>

                        <input
                            type="text"
                            name="name"
                            class="form-control"
                            required
                        >

                    </div>

                    <div class="mb-3">

                        <label>
                            Email
                        </label>

                        <input
                            type="email"
                            name="email"
                            class="form-control"
                            required
                        >

                    </div>

                    <div class="mb-3">

                        <label>
                            Password
                        </label>

                        <input
                            type="password"
                            name="password"
                            class="form-control"
                            required
                        >

                    </div>

                    <button
                        class="btn btn-success w-100"
                    >
                        Register
                    </button>

                </form>

                <hr>

                <p class="text-center">

                    Already have account?

                    <a
                        href="{{ url_for('login') }}"
                    >
                        Login
                    </a>

                </p>

            </div>

        </div>

    </div>

</div>

{% endblock %}
