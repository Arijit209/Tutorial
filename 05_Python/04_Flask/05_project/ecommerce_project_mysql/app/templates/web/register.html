{% extends 'web/base.html' %}

{% block title %}
Customer Register
{% endblock %}

{% block content %}

<div class="row justify-content-center">

    <div class="col-md-6">

        <div class="card shadow border-0 mt-5">

            <div class="card-header bg-success text-white text-center">

                <h3>

                    Customer Registration

                </h3>

            </div>

            <div class="card-body">

                <!-- REGISTER FORM -->
                <form method="POST">

                    <!-- NAME -->
                    <div class="mb-3">

                        <label class="form-label">

                            Full Name

                        </label>

                        <input
                            type="text"
                            name="name"
                            class="form-control"
                            placeholder="Enter Full Name"
                            required
                        >

                    </div>


                    <!-- EMAIL -->
                    <div class="mb-3">

                        <label class="form-label">

                            Email

                        </label>

                        <input
                            type="email"
                            name="email"
                            class="form-control"
                            placeholder="Enter Email"
                            required
                        >

                    </div>


                    <!-- PHONE -->
                    <div class="mb-3">

                        <label class="form-label">

                            Phone Number

                        </label>

                        <input
                            type="text"
                            name="phone"
                            class="form-control"
                            placeholder="Enter Phone Number"
                            required
                        >

                    </div>


                    <!-- PASSWORD -->
                    <div class="mb-3">

                        <label class="form-label">

                            Password

                        </label>

                        <input
                            type="password"
                            name="password"
                            class="form-control"
                            placeholder="Enter Password"
                            required
                        >

                    </div>


                    <!-- CONFIRM PASSWORD -->
                    <div class="mb-3">

                        <label class="form-label">

                            Confirm Password

                        </label>

                        <input
                            type="password"
                            name="confirm_password"
                            class="form-control"
                            placeholder="Confirm Password"
                            required
                        >

                    </div>


                    <!-- REGISTER BUTTON -->
                    <button
                        type="submit"
                        class="btn btn-success w-100"
                    >

                        <i class="fa fa-user-plus"></i>

                        Register

                    </button>

                </form>

            </div>

            <div class="card-footer text-center">

                Already have an account?

                <a href="{{ url_for('web.login') }}">

                    Login Here

                </a>

            </div>

        </div>

    </div>

</div>

{% endblock %}
