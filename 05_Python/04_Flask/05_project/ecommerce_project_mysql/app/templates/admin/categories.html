{% extends 'admin/base.html' %}

{% block title %}
Categories
{% endblock %}

{% block content %}

<div class="row">

    <!-- ADD CATEGORY -->
    <div class="col-md-4">

        <div class="card shadow">

            <div class="card-header">

                <h4>
                    Add Category
                </h4>

            </div>

            <div class="card-body">

                <form method="POST">

                    <div class="mb-3">

                        <label>
                            Category Name
                        </label>

                        <input
                            type="text"
                            name="name"
                            class="form-control"
                            required
                        >

                    </div>

                    <div class="mb-3">

                        <label>
                            Description
                        </label>

                        <textarea
                            name="description"
                            class="form-control"
                        ></textarea>

                    </div>

                    <button
                        class="btn btn-primary w-100"
                    >
                        Add Category
                    </button>

                </form>

            </div>

        </div>

    </div>

    <!-- CATEGORY LIST -->
    <div class="col-md-8">

        <div class="card shadow">

            <div class="card-header">

                <h4>
                    All Categories
                </h4>

            </div>

            <div class="card-body">

                <table class="table table-bordered">

                    <thead>

                        <tr>

                            <th>ID</th>
                            <th>Name</th>
                            <th>Description</th>
                            <th>Action</th>

                        </tr>

                    </thead>

                    <tbody>

                        {% for category in categories %}

                        <tr>

                            <td>
                                {{ category.id }}
                            </td>

                            <td>
                                {{ category.name }}
                            </td>

                            <td>
                                {{ category.description }}
                            </td>

                            <td>

                                <a
                                    href="{{ url_for('edit_category', id=category.id) }}"
                                    class="btn btn-warning btn-sm"
                                >
                                    Edit
                                </a>

                                <a
                                    href="{{ url_for('delete_category', id=category.id) }}"
                                    class="btn btn-danger btn-sm"
                                >
                                    Delete
                                </a>

                            </td>

                        </tr>

                        {% endfor %}

                    </tbody>

                </table>

            </div>

        </div>

    </div>

</div>

{% endblock %}
