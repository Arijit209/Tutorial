{% extends 'admin/base.html' %}

{% block title %}
Edit Product
{% endblock %}

{% block content %}

<div class="card shadow">

    <div class="card-header">

        <h4>
            Edit Product
        </h4>

    </div>

    <div class="card-body">

        <form
            method="POST"
            enctype="multipart/form-data"
        >

            <div class="row">

                <div class="col-md-6">

                    <div class="mb-3">

                        <label>
                            Product Name
                        </label>

                        <input
                            type="text"
                            name="name"
                            value="{{ product.name }}"
                            class="form-control"
                            required
                        >

                    </div>

                </div>

                <div class="col-md-6">

                    <div class="mb-3">

                        <label>
                            Price
                        </label>

                        <input
                            type="number"
                            step="0.01"
                            name="price"
                            value="{{ product.price }}"
                            class="form-control"
                            required
                        >

                    </div>

                </div>

            </div>

            <div class="row">

                <div class="col-md-6">

                    <div class="mb-3">

                        <label>
                            Stock
                        </label>

                        <input
                            type="number"
                            name="stock"
                            value="{{ product.stock }}"
                            class="form-control"
                            required
                        >

                    </div>

                </div>

                <div class="col-md-6">

                    <div class="mb-3">

                        <label>
                            Category
                        </label>

                        <select
                            name="category_id"
                            class="form-control"
                            required
                        >

                            {% for category in categories %}

                                <option
                                    value="{{ category.id }}"
                                    {% if product.category_id == category.id %}
                                        selected
                                    {% endif %}
                                >
                                    {{ category.name }}
                                </option>

                            {% endfor %}

                        </select>

                    </div>

                </div>

            </div>

            <div class="mb-3">

                <label>
                    Current Image
                </label>

                <br>

                {% if product.image %}

                    <img
                        src="{{ url_for('static', filename='images/' + product.image) }}"
                        width="120"
                        class="mb-2"
                    >

                {% else %}

                    <p>
                        No Image
                    </p>

                {% endif %}

            </div>

            <div class="mb-3">

                <label>
                    Change Image
                </label>

                <input
                    type="file"
                    name="image"
                    class="form-control"
                >

            </div>

            <div class="mb-3">

                <label>
                    Description
                </label>

                <textarea
                    name="description"
                    class="form-control"
                    rows="5"
                >{{ product.description }}</textarea>

            </div>

            <button
                class="btn btn-success"
            >
                Update Product
            </button>

            <a
                href="{{ url_for('products') }}"
                class="btn btn-secondary"
            >
                Back
            </a>

        </form>

    </div>

</div>

{% endblock %}
