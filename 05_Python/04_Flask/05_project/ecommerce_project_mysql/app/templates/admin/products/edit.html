{% extends 'admin/base.html' %}

{% block title %}
Edit Product
{% endblock %}

{% block page_title %}
Edit Product
{% endblock %}

{% block content %}

<div class="container-fluid">

    <div class="row justify-content-center">

        <div class="col-md-8">

            <div class="card card-box">

                <div class="card-header bg-warning text-dark">

                    <h5>

                        Edit Product

                    </h5>

                </div>

                <div class="card-body">

                    <!-- EDIT PRODUCT FORM -->
                    <form
                        method="POST"
                        enctype="multipart/form-data"
                    >

                        <!-- PRODUCT NAME -->
                        <div class="mb-3">

                            <label class="form-label">

                                Product Name

                            </label>

                            <input
                                type="text"
                                name="name"
                                class="form-control"
                                value="{{ product.name }}"
                                required
                            >

                        </div>


                        <!-- PRICE -->
                        <div class="mb-3">

                            <label class="form-label">

                                Product Price

                            </label>

                            <input
                                type="number"
                                step="0.01"
                                name="price"
                                class="form-control"
                                value="{{ product.price }}"
                                required
                            >

                        </div>


                        <!-- STOCK -->
                        <div class="mb-3">

                            <label class="form-label">

                                Product Stock

                            </label>

                            <input
                                type="number"
                                name="stock"
                                class="form-control"
                                value="{{ product.stock }}"
                                required
                            >

                        </div>


                        <!-- CATEGORY -->
                        <div class="mb-3">

                            <label class="form-label">

                                Select Category

                            </label>

                            <select
                                name="category_id"
                                class="form-select"
                                required
                            >

                                {% for category in categories %}

                                    <option
                                        value="{{ category.id }}"
                                        {% if category.id == product.category_id %}
                                            selected
                                        {% endif %}
                                    >

                                        {{ category.name }}

                                    </option>

                                {% endfor %}

                            </select>

                        </div>


                        <!-- DESCRIPTION -->
                        <div class="mb-3">

                            <label class="form-label">

                                Description

                            </label>

                            <textarea
                                name="description"
                                rows="5"
                                class="form-control"
                                required
                            >{{ product.description }}</textarea>

                        </div>


                        <!-- CURRENT IMAGE -->
                        <div class="mb-3">

                            <label class="form-label">

                                Current Image

                            </label>

                            <br>

                            {% if product.image %}

                                <img
                                    src="{{ url_for('static', filename='images/' + product.image) }}"
                                    width="120"
                                    class="rounded shadow"
                                >

                            {% else %}

                                <p>

                                    No Image Found

                                </p>

                            {% endif %}

                        </div>


                        <!-- NEW IMAGE -->
                        <div class="mb-3">

                            <label class="form-label">

                                Change Image

                            </label>

                            <input
                                type="file"
                                name="image"
                                class="form-control"
                            >

                        </div>


                        <!-- UPDATE BUTTON -->
                        <div class="d-grid">

                            <button
                                type="submit"
                                class="btn btn-warning"
                            >

                                <i class="fa fa-edit"></i>

                                Update Product

                            </button>

                        </div>

                    </form>

                </div>

                <div class="card-footer text-center">

                    <a
                        href="{{ url_for('admin.products') }}"
                        class="btn btn-secondary"
                    >

                        <i class="fa fa-arrow-left"></i>

                        Back

                    </a>

                </div>

            </div>

        </div>

    </div>

</div>

{% endblock %}
