{% extends 'admin/base.html' %}

{% block title %}
Create Product
{% endblock %}

{% block page_title %}
Create Product
{% endblock %}

{% block content %}

<div class="container-fluid">

    <div class="row justify-content-center">

        <div class="col-md-8">

            <div class="card card-box">

                <div class="card-header bg-dark text-white">

                    <h5>

                        Add New Product

                    </h5>

                </div>

                <div class="card-body">

                    <!-- PRODUCT FORM -->
                    <form
                        method="POST"
                        enctype="multipart/form-data"
                    >

                        <!-- PRODUCT NAME -->
                        <div class="mb-3">

                            <label class="form-label">

                                Product Name

                            </label>

                            <input
                                type="text"
                                name="name"
                                class="form-control"
                                placeholder="Enter Product Name"
                                required
                            >

                        </div>


                        <!-- PRICE -->
                        <div class="mb-3">

                            <label class="form-label">

                                Product Price

                            </label>

                            <input
                                type="number"
                                step="0.01"
                                name="price"
                                class="form-control"
                                placeholder="Enter Product Price"
                                required
                            >

                        </div>


                        <!-- STOCK -->
                        <div class="mb-3">

                            <label class="form-label">

                                Product Stock

                            </label>

                            <input
                                type="number"
                                name="stock"
                                class="form-control"
                                placeholder="Enter Product Stock"
                                required
                            >

                        </div>


                        <!-- CATEGORY -->
                        <div class="mb-3">

                            <label class="form-label">

                                Select Category

                            </label>

                            <select
                                name="category_id"
                                class="form-select"
                                required
                            >

                                <option value="">

                                    Select Category

                                </option>

                                {% for category in categories %}

                                    <option value="{{ category.id }}">

                                        {{ category.name }}

                                    </option>

                                {% endfor %}

                            </select>

                        </div>


                        <!-- DESCRIPTION -->
                        <div class="mb-3">

                            <label class="form-label">

                                Description

                            </label>

                            <textarea
                                name="description"
                                rows="5"
                                class="form-control"
                                placeholder="Enter Product Description"
                                required
                            ></textarea>

                        </div>


                        <!-- IMAGE -->
                        <div class="mb-3">

                            <label class="form-label">

                                Product Image

                            </label>

                            <input
                                type="file"
                                name="image"
                                class="form-control"
                                required
                            >

                        </div>


                        <!-- SUBMIT BUTTON -->
                        <div class="d-grid">

                            <button
                                type="submit"
                                class="btn btn-dark"
                            >

                                <i class="fa fa-plus"></i>

                                Create Product

                            </button>

                        </div>

                    </form>

                </div>

                <div class="card-footer text-center">

                    <a
                        href="{{ url_for('admin.products') }}"
                        class="btn btn-secondary"
                    >

                        <i class="fa fa-arrow-left"></i>

                        Back

                    </a>

                </div>

            </div>

        </div>

    </div>

</div>

{% endblock %}
