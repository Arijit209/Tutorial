{% extends 'admin/base.html' %}

{% block title %}
Admin Login
{% endblock %}

{% block page_title %}
Admin Login
{% endblock %}

{% block content %}

<div class="container">

    <div class="row justify-content-center">

        <div class="col-md-5">

            <div class="card card-box mt-5">

                <div class="card-header bg-dark text-white text-center">

                    <h3>

                        Admin Login

                    </h3>

                </div>

                <div class="card-body">

                    <!-- LOGIN FORM -->
                    <form method="POST">

                        <!-- EMAIL -->
                        <div class="mb-3">

                            <label class="form-label">

                                Email

                            </label>

                            <input
                                type="email"
                                name="email"
                                class="form-control"
                                placeholder="Enter Email"
                                required
                            >

                        </div>

                        <!-- PASSWORD -->
                        <div class="mb-3">

                            <label class="form-label">

                                Password

                            </label>

                            <input
                                type="password"
                                name="password"
                                class="form-control"
                                placeholder="Enter Password"
                                required
                            >

                        </div>

                        <!-- LOGIN BUTTON -->
                        <div class="d-grid">

                            <button
                                type="submit"
                                class="btn btn-dark"
                            >

                                Login

                            </button>

                        </div>

                    </form>

                </div>

                <div class="card-footer text-center">

                    Don't have an account?

                    <a href="{{ url_for('admin.admin_register') }}">

                        Register Here

                    </a>

                </div>

            </div>

        </div>

    </div>

</div>

{% endblock %}
