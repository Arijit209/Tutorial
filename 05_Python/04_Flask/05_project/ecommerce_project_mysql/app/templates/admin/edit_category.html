{% extends 'admin/base.html' %}

{% block title %}
Edit Category
{% endblock %}

{% block content %}

<div class="card shadow">

    <div class="card-header">

        <h4>
            Edit Category
        </h4>

    </div>

    <div class="card-body">

        <form method="POST">

            <div class="mb-3">

                <label>
                    Category Name
                </label>

                <input
                    type="text"
                    name="name"
                    value="{{ category.name }}"
                    class="form-control"
                    required
                >

            </div>

            <div class="mb-3">

                <label>
                    Description
                </label>

                <textarea
                    name="description"
                    class="form-control"
                >{{ category.description }}</textarea>

            </div>

            <button
                class="btn btn-success"
            >
                Update Category
            </button>

        </form>

    </div>

</div>

{% endblock %}
