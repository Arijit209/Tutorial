<!DOCTYPE html>
<html>
<head>
    <title>My Profile</title>
</head>
<body>

    <h1>Contact Me</h1>

    <form action="">

        <label>Name:</label><br>
        <input type="text" placeholder="Enter your name" required><br><br>

        <label>Email:</label><br>
        <input type="email" placeholder="Enter your email" required><br><br>

        <label>Phone:</label><br>
        <input type="text" placeholder="Enter your phone number"><br><br>

        <label>Password:</label><br>
        <input type="password" placeholder="Enter password"><br><br>

        <label>Date of Birth:</label><br>
        <input type="date"><br><br>

        <label>Gender:</label><br>
        <input type="radio" name="gender"> Male
        <input type="radio" name="gender"> Female<br><br>

        <label>Skills:</label><br>
        <input type="checkbox"> HTML
        <input type="checkbox"> CSS
        <input type="checkbox"> JavaScript<br><br>

        <label>Message:</label><br>
        <textarea placeholder="Enter your message"></textarea><br><br>

        <button>Send Message</button>

    </form>

</body>
</html>
